# فرضيات Failed Breakout — فوليوم + عمق دفتر (دخول/مراقبة/تنفيذ/خروج)
# دخول سببي عند إغلاق الشمعة — ليس ملء وهمي عند مستوى الكسر

[determinism]
global_seed = 20260719

[temporal]
interval_ns = 1_000_000_000
horizon = 1
embargo_ns = 1_000_000_000

[cross_market]
latency_ns = 0
lead_lag_window = 2

[execution]
mode = "intraday"
slippage_ticks = 0.5
tick_size = 0.25
commission_bps = 0.0

[ssl]
mode = "tick"
window = 5
n_components = 4
n_splits = 3

[signals]
include_failed_breakout = true
include_failed_fvg = false
include_auction_vp = false
columns = [
  "fail_breakout",
  "fb_effort_range_ratio",
  "fb_effort_volume_ratio",
  "fb_effort_result_ratio",
  "fb_bar_volume",
  "fb_cum_volume",
  "fb_delta",
  "fb_cum_delta",
  "fb_vol_imbalance",
  "fb_absorption",
  "fb_depth_at_break",
  "fb_depth_imbalance",
  "fb_depth_cum_bid",
  "fb_depth_cum_ask",
  "depth_imbalance",
  "depth_cum_bid",
  "depth_cum_ask",
  "trap_setup",
  "nq_delta",
  "mnq_delta",
  "lead_lag",
]

[statistics]
alpha = 0.05
n_permutations = 2000

[data]
nq_path = "data/raw/nq.parquet"
mnq_path = "data/raw/nq.parquet"
output_dir = "data/runs/fail_breakout"
cross_market_mode = "nq_only"
max_rows = 0

[run]
quiet = false
